<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <label class="theme-toggle" for="theme-toggle" title="Cambiar tema claro/oscuro">
      <input type="checkbox" id="theme-toggle" />
      <span class="theme-toggle-track"><span class="theme-toggle-thumb"></span></span>
      <span class="theme-toggle-text">Claro</span>
    </label>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="scores-panel" class="scores-panel hidden">
          <form id="name-form" class="name-form hidden">
            <label class="label" for="player-name">¡Nuevo record! Tu nombre</label>
            <div class="name-form-row">
              <input id="player-name" type="text" maxlength="12" autocomplete="off"
                     spellcheck="false" placeholder="Anónimo" />
              <button type="submit" id="save-score-btn">Guardar</button>
            </div>
          </form>

          <span class="label">MEJORES PUNTUACIONES</span>
          <table class="scores-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Puntos</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="scores-body"></tbody>
          </table>
          <p id="scores-bests" class="scores-bests"></p>
          <button type="button" id="reset-scores-btn" class="secondary-btn">Borrar records</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
